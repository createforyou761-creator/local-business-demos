<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{business_name}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      background: #fafafa;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 0 1.25rem; }
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 2rem 0;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .hero {
      padding: 2.5rem 0;
      text-align: center;
    }
    .hero h2 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-weight: 600;
      color: #1a1a1a;
    }
    .hero p { margin: 0; color: #555; }
    section {
      padding: 2rem 0;
      border-bottom: 1px solid #eee;
    }
    section:last-of-type { border-bottom: none; }
    h3 {
      margin: 0 0 1rem;
      font-size: 1.125rem;
      font-weight: 600;
      color: #1a1a1a;
    }
    .services-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .services-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      color: #444;
    }
    .services-list li:last-child { border-bottom: none; }
    .about p { margin: 0; color: #444; }
    .cta-box {
      background: #1a1a1a;
      color: #fff;
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
    }
    .cta-box p { margin: 0 0 1rem; }
    .cta-box a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #fff;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 600;
      border-radius: 6px;
      transition: opacity 0.2s;
    }
    .cta-box a:hover { opacity: 0.9; }
    .contact {
      text-align: center;
      padding: 2rem 0;
    }
    .contact a {
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.25rem;
    }
    .contact .town { display: block; margin-top: 0.25rem; color: #666; font-weight: 400; font-size: 1rem; }
    footer {
      padding: 1.5rem 0;
      text-align: center;
      color: #888;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>{{business_name}}</h1>
    </div>
  </header>
  <main>
    <section class="hero">
      <div class="container">
        <h2>{{headline}}</h2>
        <p>{{town}}</p>
      </div>
    </section>
    <section class="services">
      <div class="container">
        <h3>Services</h3>
        <ul class="services-list">
          {{services}}
        </ul>
      </div>
    </section>
    <section class="about">
      <div class="container">
        <h3>About</h3>
        <p>{{about}}</p>
      </div>
    </section>
    <section class="cta">
      <div class="container">
        <div class="cta-box">
          <p>{{cta}}</p>
          <a href="tel:{{phone}}">Call {{phone}}</a>
        </div>
      </div>
    </section>
    <section class="contact">
      <div class="container">
        <a href="tel:{{phone}}">{{phone}}</a>
        <span class="town">{{town}}</span>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">{{business_name}} · {{town}}</div>
  </footer>
</body>
</html>
