            color: #1e293b;

        .faq-question:hover {
            background: #f1f5f9;

        .faq-question:after {
            content: '+';
            position: absolute;
            right: 20px;

            transition: transform 0.3s ease;
        }

        .faq-checkbox {
            display: none;
        }

        .faq-checkbox:checked + .faq-question:after {
            transform: rotate(45deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
        }

        .faq-checkbox:checked ~ .faq-answer {
            max-height: 200px;
        }
